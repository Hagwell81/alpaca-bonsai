<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">
			<!-- Skeleton shown instantly before JS hydrates; removed by SvelteKit on mount -->
			<div id="app-skeleton" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;z-index:9999;transition:opacity 0.3s;">
				<div style="text-align:center;">
					<div style="width:48px;height:48px;border:3px solid rgba(255,255,255,0.1);border-top-color:#10a37f;border-radius:50%;animation:sk-spin 1s linear infinite;margin:0 auto 1rem;"></div>
					<div style="font-size:1.2rem;font-weight:600;letter-spacing:0.5px;">Alpaca</div>
					<div style="font-size:0.85rem;color:#8b949e;margin-top:0.5rem;">Loading interface...</div>
				</div>
			</div>
			<style>
				@keyframes sk-spin { to { transform: rotate(360deg); } }
			</style>
			%sveltekit.body%
		</div>
	</body>
</html>
